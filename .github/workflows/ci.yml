name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── LINT ──────────────────────────────────────────────────────────────────

  lint-backend-python:
    name: Lint — Python (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff
      - run: ruff check backend/

  lint-backend-java:
    name: Lint — Java (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Compile
        working-directory: backend-java
        run: mvn compile --no-transfer-progress -q

  lint-frontend:
    name: Lint — Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint -- .

  # ─── TEST ──────────────────────────────────────────────────────────────────

  test-backend-python:
    name: Test — Python (FastAPI)
    runs-on: ubuntu-latest
    needs: lint-backend-python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: easylearn_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://test:test@localhost/easylearn_test
      SECRET_KEY: ci-secret-key-not-for-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "30"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --quiet uv
          uv pip install --system --quiet -r backend/requirements.txt
          uv pip install --system --quiet pytest pytest-asyncio httpx
      - name: Apply schema
        run: PGPASSWORD=test psql -h localhost -U test -d easylearn_test -f database/init.sql
      - name: Run tests
        run: pytest backend/ -v --tb=short

  test-backend-java:
    name: Test — Java (Spring Boot)
    runs-on: ubuntu-latest
    needs: lint-backend-java
    # PostgreSQL géré par Testcontainers — pas de services: ici (Phase 5)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Run tests
        working-directory: backend-java
        run: mvn test --no-transfer-progress

  test-frontend:
    name: Test — Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test -- --passWithNoTests

  # ─── BUILD ─────────────────────────────────────────────────────────────────

  build-backend-python:
    name: Build — Python (FastAPI)
    runs-on: ubuntu-latest
    needs: test-backend-python
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target runner -t easylearn/backend:ci backend/

  build-backend-java:
    name: Build — Java (Spring Boot)
    runs-on: ubuntu-latest
    needs: test-backend-java
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target runner -t easylearn/backend-java:ci backend-java/

  build-frontend:
    name: Build — Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: test-frontend
    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --target runner \
            -t easylearn/frontend:ci \
            frontend/
