stages:
  - lint
  - test
  - build

# ─── LINT ─────────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check backend/

lint:frontend:
  stage: lint
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npm run lint -- .

# ─── TEST ─────────────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: easylearn_test
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    DATABASE_URL: postgresql://test:test@postgres/easylearn_test
    SECRET_KEY: ci-secret-key-not-for-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRE_MINUTES: "30"
  before_script:
    - apt-get update -qq && apt-get install -y -qq postgresql-client
    - pip install --quiet uv
    - uv pip install --system --quiet -r backend/requirements.txt
    - uv pip install --system --quiet pytest pytest-asyncio httpx
    - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB -f database/init.sql
  script:
    - pytest backend/ -v --tb=short

test:frontend:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npm test -- --passWithNoTests

# ─── BUILD ────────────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build --target runner -t easylearn/backend:ci backend/

build:frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    NEXT_PUBLIC_API_URL: "http://localhost:8000"
  script:
    - docker build --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL --target runner -t easylearn/frontend:ci frontend/