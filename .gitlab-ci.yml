stages:
  - lint
  - test
  # ajouter build et deploy plus tard

# ─── LINT ─────────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check backend/

lint:frontend:
  stage: lint
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npm run lint -- .

# ─── TEST ─────────────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: easylearn_test
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    DATABASE_URL: postgresql://test:test@postgres/easylearn_test
    SECRET_KEY: ci-secret-key-not-for-production
    JWT_ALGORITHM: HS256
    JWT_EXPIRE_MINUTES: "30"
  before_script:
    - pip install --quiet uv
    - uv pip install --system --quiet -r backend/requirements.txt
    - uv pip install --system --quiet pytest pytest-asyncio httpx
  script:
    - pytest backend/ -v --tb=short
  allow_failure: true  # a supprimer quand Thomas aura bien voulu faire ses tests pytest

test:frontend:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npm test -- --passWithNoTests
  allow_failure: true  # a supprimer quand Matthieu aura bien voulu configuré Jest et écrire les tests