services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - easylearn-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_SYSTEM_PROMPT=${OLLAMA_SYSTEM_PROMPT}
      - PISTON_API_URL=${PISTON_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - easylearn-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - easylearn-network
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - easylearn-network
    restart: unless-stopped

  piston-setup:
    image: curlimages/curl:latest
    depends_on:
      piston:
        condition: service_healthy
    command: >
      sh -c "
        curl -sf -X POST http://piston:2000/api/v2/packages
          -H 'Content-Type: application/json'
          -d '{\"language\":\"python\",\"version\":\"3.10.0\"}' &&
        curl -sf -X POST http://piston:2000/api/v2/packages
          -H 'Content-Type: application/json'
          -d '{\"language\":\"javascript\",\"version\":\"18.15.0\"}'
      "
    networks:
      - easylearn-network
    restart: "no"

networks:
  easylearn-network:
    driver: bridge

volumes:
  postgres-data:
